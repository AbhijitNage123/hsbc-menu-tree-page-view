name: PHP Tests

on: [push]

jobs:
  phpunit:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, intl

      - name: Install dependencies
        run: composer update

      - name: Run PHPUnit
        run: vendor/bin/phpunit